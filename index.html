<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>프리미엄 가계부 v4.0</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#38bdf8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4.0.2/dist/tesseract.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-primary: #38bdf8;
            --accent-secondary: #818cf8;
            --danger: #ef4444;
            --success: #22c55e;
            --glass: rgba(30, 41, 59, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            padding: 1rem;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(to right, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 0.5rem;
        }

        .tab-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1rem;
            font-weight: 600;
            padding: 0.75rem 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .tab-btn.active {
            color: var(--accent-primary);
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -0.5rem;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--accent-primary);
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.25rem;
            padding: 1.5rem;
            backdrop-filter: blur(10px);
        }

        .card-title {
            color: var(--text-secondary);
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .card-value {
            font-size: 1.75rem;
            font-weight: 700;
        }

        .charts-container {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        th {
            text-align: left;
            padding: 1rem;
            color: var(--text-secondary);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .category-tag {
            padding: 0.2rem 0.6rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-block;
        }

        .cat-고정비 {
            background: rgba(56, 189, 248, 0.2);
            color: var(--accent-primary);
        }

        .cat-저축 {
            background: rgba(34, 197, 94, 0.2);
            color: var(--success);
        }

        .cat-식비 {
            background: rgba(22, 163, 74, 0.2);
            color: #4ade80;
        }

        .cat-쇼핑 {
            background: rgba(168, 85, 247, 0.2);
            color: #a855f7;
        }

        .cat-생활_미용 {
            background: rgba(236, 72, 153, 0.2);
            color: #ec4899;
        }

        .cat-여가_여행 {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
        }

        .cat-교통 {
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
        }

        .cat-통신_보험_공과금 {
            background: rgba(20, 184, 166, 0.2);
            color: #14b8a6;
        }

        .cat-수입 {
            background: rgba(34, 197, 94, 0.2);
            color: var(--success);
        }

        .cat-기타 {
            background: rgba(148, 163, 184, 0.2);
            color: var(--text-secondary);
        }

        /* 수동 입력 폼 스타일 */
        .manual-entry-container {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 2rem;
        }

        .entry-form-card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 1.25rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .form-control {
            width: 100%;
            padding: 0.75rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.5rem;
            color: white;
            font-size: 1rem;
        }

        .btn-submit {
            width: 100%;
            padding: 0.75rem;
            background: var(--accent-primary);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
        }

        .delete-btn {
            color: #ef4444;
            cursor: pointer;
            font-size: 0.8rem;
            margin-left: 1rem;
        }

        /* 진행률 바 */
        .progress-container {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            margin-top: 8px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: var(--accent-primary);
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        /* 설정 카드 */
        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        .settings-card {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 1.25rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* 필터 바 */
        .filter-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .search-input,
        .filter-select {
            background: var(--bg-color);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            padding: 0.6rem 1rem;
            border-radius: 8px;
        }

        /* 달력 스타일 */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 1px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            overflow: hidden;
        }

        .calendar-header {
            background: var(--card-bg);
            padding: 1rem;
            text-align: center;
            font-weight: 700;
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        .calendar-day {
            background: var(--card-bg);
            min-height: 100px;
            padding: 0.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            transition: background 0.2s;
        }

        .day-number {
            font-size: 0.9rem;
            font-weight: 600;
        }

        .day-info {
            font-size: 0.7rem;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .btn-github {
            background: #24292f;
            color: white;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* 📱 모바일 최적화 미디어 쿼리 (강력한 버전) */
        @media (max-width: 768px) {
            body {
                padding: 0 0 80px 0 !important;
                width: 100vw !important;
                overflow-x: hidden !important;
            }

            .container {
                padding: 1rem !important;
                width: 100% !important;
                max-width: 100vw !important;
                margin: 0 !important;
            }

            header {
                flex-direction: column !important;
                align-items: center !important;
                text-align: center !important;
                gap: 1.5rem !important;
            }

            header>div {
                width: 100% !important;
                display: flex !important;
                flex-direction: column !important;
                align-items: center !important;
                gap: 0.5rem !important;
            }

            header h1 {
                font-size: 1.6rem !important;
                white-space: nowrap !important;
                display: block !important;
                width: 100% !important;
                margin: 0 !important;
                line-height: 1.2 !important;
            }

            header p {
                font-size: 0.9rem !important;
                white-space: nowrap !important;
                opacity: 0.8;
            }

            header>div:last-child {
                flex-direction: row !important;
                flex-wrap: wrap !important;
                justify-content: center !important;
                gap: 0.75rem !important;
            }

            /* 하단 고정 내비게이션 바 */
            .tabs {
                position: fixed !important;
                bottom: 0 !important;
                left: 0 !important;
                width: 100% !important;
                background: #1e293b !important;
                display: flex !important;
                justify-content: space-around !important;
                padding: 0.7rem 0.2rem !important;
                z-index: 9999 !important;
                border-top: 1px solid rgba(255, 255, 255, 0.1) !important;
                margin: 0 !important;
                gap: 0 !important;
                border-bottom: none !important;
            }

            .tab-btn {
                flex: 1;
                font-size: 0.65rem !important;
                padding: 0.4rem 0 !important;
                display: flex;
                flex-direction: column;
                align-items: center;
                color: #94a3b8;
                border: none !important;
            }

            .tab-btn.active {
                color: #38bdf8 !important;
                background: rgba(56, 189, 248, 0.1) !important;
                border-radius: 8px;
            }

            .tab-btn.active::after {
                display: none !important;
            }

            .summary-grid,
            .charts-container,
            .settings-grid,
            .manual-entry-container {
                grid-template-columns: 1fr !important;
                gap: 1rem !important;
            }

            .card {
                padding: 1.25rem !important;
                border-radius: 1.25rem !important;
            }

            .card-value {
                font-size: 1.5rem !important;
            }

            table {
                font-size: 0.75rem !important;
                display: block !important;
                overflow-x: auto !important;
            }

            .calendar-day {
                min-height: 55px !important;
            }

            .day-number {
                font-size: 0.75rem !important;
            }

            .day-info {
                font-size: 0.6rem !important;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <div>
                <h1>프리미엄 가계부</h1>
                <p style="color: var(--text-secondary); margin-top: 0.25rem;">스마트한 자산 관리를 시작하세요</p>
            </div>
            <div style="display: flex; align-items: center; gap: 1rem;">
                <a href="https://github.com" target="_blank" class="btn-github" id="github-link">
                    <svg height="20" viewBox="0 0 16 16" version="1.1" width="20" aria-hidden="true"
                        fill="currentColor">
                        <path
                            d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z">
                        </path>
                    </svg>
                    GitHub 동기화
                </a>
                <div id="date-now"
                    style="color: var(--text-secondary); font-weight: 600; display: flex; align-items: center; gap: 1rem;">
                    <select id="month-selector" class="filter-select" onchange="updateByMonth()"
                        style="margin-bottom: 0;">
                        <option value="all">전체 보기</option>
                        <option value="12">12월</option>
                        <option value="01">1월</option>
                        <option value="02">2월</option>
                        <option value="03" selected>3월</option>
                    </select>
                    <span>2026.03.10</span>
                </div>
            </div>
        </header>

        <div class="tabs">
            <button class="tab-btn active" onclick="openTab(event, 'summary')">📊 종합 요약</button>
            <button class="tab-btn" onclick="openTab(event, 'calendar')">📅 달력 보기</button>
            <button class="tab-btn" onclick="openTab(event, 'details')">💳 상세 내역</button>
            <button class="tab-btn" onclick="openTab(event, 'analysis')">📈 월별 분석</button>
            <button class="tab-btn" onclick="openTab(event, 'manual')">➕ 수동 입력</button>
            <button class="tab-btn" onclick="openTab(event, 'settings')">⚙️ 설정</button>
        </div>

        <!-- 탭 1: 종합 요약 -->
        <div id="summary" class="tab-content active">
            <div id="smart-insight" class="insight-box" style="display:none;">
                <!-- 지능형 인사이트가 여기에 표시됨 -->
            </div>
            <div class="summary-grid">
                <div class="card">
                    <div class="card-title">월 수입</div>
                    <div class="card-value" id="total-income">0원</div>
                </div>
                <div class="card">
                    <div class="card-title">총 지출</div>
                    <div class="card-value" style="color: var(--danger);" id="total-expense">0원</div>
                </div>
                <div class="card">
                    <div class="card-title">남은 예산</div>
                    <div class="card-value" id="balance" style="color: var(--success);">0원</div>
                </div>
            </div>

            <div class="charts-container">
                <div class="card">
                    <h3 style="margin-bottom: 1.5rem;">지출 카테고리 분포</h3>
                    <div style="height: 300px; display: flex; justify-content: center;">
                        <canvas id="categoryChart"></canvas>
                    </div>
                </div>
                <div class="card">
                    <h3 style="margin-bottom: 1.5rem;">카테고리별 예산 현황</h3>
                    <div id="budget-progress-list" style="max-height: 300px; overflow-y: auto;">
                        <!-- JS로 채워질 예정 -->
                    </div>
                </div>
                <div class="card">
                    <h3 style="margin-bottom: 1.5rem;">고정 지출 내역</h3>
                    <div id="fixed-expenses-list" style="max-height: 300px; overflow-y: auto; padding-right: 0.5rem;">
                        <!-- JS로 채워질 예정 -->
                    </div>
                </div>
            </div>

            <div class="card">
                <h3 style="margin-bottom: 1rem;">최근 큰 지출 상위 5건</h3>
                <table id="top-expenses">
                    <thead>
                        <tr>
                            <th>날짜</th>
                            <th>가맹점</th>
                            <th>금액</th>
                            <th>카테고리</th>
                        </tr>
                    </thead>
                    <tbody><!-- JS로 채움 --></tbody>
                </table>
            </div>
        </div>
        <!-- 탭 4: 달력 보기 -->
        <div id="calendar" class="tab-content">
            <div class="card">
                <div class="calendar-grid" id="calendar-body">
                    <!-- JS로 채워짐 -->
                </div>
                <div id="selected-day-info" class="selected-day-details">
                    <p style="color: var(--text-secondary); text-align: center; margin-top: 1rem;">날짜를 선택하면 상세 내역이
                        표시됩니다.</p>
                </div>
            </div>
        </div>

        <!-- 탭 2: 상세 내역 -->
        <div id="details" class="tab-content">
            <div class="card">
                <div class="filter-bar">
                    <input type="text" class="search-input" id="search-tx" placeholder="가맹점 검색..."
                        onkeyup="filterTable()">
                    <select class="filter-select" id="filter-cat" onchange="filterTable()">
                        <option value="all">모든 카테고리</option>
                    </select>
                </div>
                <div style="max-height: 600px; overflow-y: auto;">
                    <table id="all-expenses">
                        <thead>
                            <tr>
                                <th>날짜</th>
                                <th>가맹점</th>
                                <th>금액</th>
                                <th>카테고리</th>
                            </tr>
                        </thead>
                        <tbody><!-- JS로 채움 --></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- 탭 3: 월별 분석 -->
        <div id="analysis" class="tab-content">
            <div class="card">
                <h3 style="margin-bottom: 1.5rem;">월별 지출 추이</h3>
                <div style="height: 400px;">
                    <canvas id="trendChart"></canvas>
                </div>
            </div>
        </div>

        <!-- 탭 5: 수동 입력 -->
        <div id="manual" class="tab-content">
            <div class="manual-entry-container">
                <div class="entry-form-card">
                    <h2 style="margin-bottom: 1.5rem;">새 거래 추가</h2>
                    <div class="form-group">
                        <label>날짜</label>
                        <input type="date" id="m-date" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>구분</label>
                        <select id="m-type" class="form-control">
                            <option value="expense">지출</option>
                            <option value="income">수입</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>내용 (가맹점명)</label>
                        <input type="text" id="m-merchant" class="form-control" placeholder="교통비, 식비 등">
                    </div>
                    <div class="form-group">
                        <label>금액</label>
                        <input type="number" id="m-amount" class="form-control" placeholder="0">
                    </div>
                    <div class="form-group">
                        <label>카테고리</label>
                        <select id="m-category" class="form-control">
                            <option value="식비">식비</option>
                            <option value="교통">교통</option>
                            <option value="쇼핑">쇼핑</option>
                            <option value="생활/미용">생활/미용</option>
                            <option value="여가/여행">여가/여행</option>
                            <option value="통신/보험/공과금">통신/보험/공과금</option>
                            <option value="기타">기타</option>
                        </select>
                    </div>
                    <button class="btn-submit" onclick="addManualEntry()">저장하기</button>
                </div>

                <div class="manual-list-card">
                    <h2 style="margin-bottom: 1.5rem;">내가 직접 입력한 내역</h2>
                    <div style="max-height: 500px; overflow-y: auto;">
                        <table id="manual-records-table">
                            <thead>
                                <tr>
                                    <th>날짜</th>
                                    <th>내용</th>
                                    <th>금액</th>
                                    <th>관리</th>
                                </tr>
                            </thead>
                            <tbody id="manual-entries-body">
                                <!-- 데이터 유입 -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- 탭 6: 설정 -->
        <div id="settings" class="tab-content">
            <div class="settings-grid">
                <!-- 6-1. 예산 관리 -->
                <div class="settings-card">
                    <h2 style="margin-bottom: 1.5rem;">💰 카테고리별 예산 설정</h2>
                    <div id="budget-settings-list">
                        <!-- JS로 동적 생성 -->
                    </div>
                </div>

                <!-- 6-2. 고정비 관리 -->
                <div class="settings-card">
                    <h2 style="margin-bottom: 1.5rem;">⚙️ 고정비 관리</h2>

                    </div>

                <!-- 6-3. 데이터 관리 -->
                <div class="settings-card" style="grid-column: span 2;">
                    <h2 style="margin-bottom: 1.5rem;">💾 데이터 관리</h2>
                    <div style="display: flex; gap: 1rem; flex-wrap: wrap;">

    <script id='finance-data'
        type='application/json'>{"income": 0, "fixed_expenses": [], "variable_transactions": [], "monthly_stats": {}}</script>












    <script>
        let fullData = JSON.parse(document.getElementById('finance-data').textContent);
        let manualData = JSON.parse(localStorage.getItem('manualFinances') || '[]');
        let userSettings = JSON.parse(localStorage.getItem('userSettings_v4') || JSON.stringify({
            budgets: { "식비": 600000, "교통": 150000, "쇼핑": 200000, "생활_미용": 100000, "통신_보험_공과금": 300000, "기타": 100000 },
            fixedExpenses: fullData.fixed_expenses // 초기값은 서버 데이터
        }));
        let categoryChart, trendChart;

        function openTab(evt, tabName) {
            const contents = document.getElementsByClassName("tab-content");
            for (let i = 0; i < contents.length; i++) {
                contents[i].style.display = "none";
                contents[i].classList.remove("active");
            }

            const buttons = document.getElementsByClassName("tab-btn");
            for (let i = 0; i < buttons.length; i++) buttons[i].classList.remove("active");

            const target = document.getElementById(tabName);
            if (target) {
                target.style.display = "block";
                target.classList.add("active");
            }

            if (evt && evt.currentTarget) {
                evt.currentTarget.classList.add("active");
            } else {
                // 이벤트 없이 호출된 경우 해당 탭 버튼을 찾아 활성화
                const btn = Array.from(buttons).find(b => b.getAttribute('onclick')?.includes(tabName));
                if (btn) btn.classList.add("active");
            }
        }

        function init() {
            initTrendChart();
            renderManualList();
            renderSettings();
            updateByMonth();

            // 오늘 날짜 기본 세팅
            const today = new Date();
            document.getElementById('m-date').value = today.toISOString().split('T')[0];

            // 초기 탭 설정
            document.querySelectorAll('.tab-content').forEach(tc => {
                if (!tc.classList.contains('active')) tc.style.display = 'none';
            });
        }

        // v4.0 설정 탭 렌더링
        function renderSettings() {
            // 예산 설정 리스트
            const bList = document.getElementById('budget-settings-list');
            bList.innerHTML = '';
            Object.keys(userSettings.budgets).forEach(cat => {
                const item = document.createElement('div');
                item.className = 'budget-item';
                item.innerHTML = `
                    <span style="font-weight:600;">${cat.replace('_', '/')}</span>
                    <input type="number" class="form-control" style="width:150px;" 
                        value="${userSettings.budgets[cat]}" 
                        onchange="updateBudget('${cat}', this.value)">
                `;
                bList.appendChild(item);
            });

            // 고정비 설정 리스트
            const fList = document.getElementById('fixed-settings-list');
            fList.innerHTML = '';
            userSettings.fixedExpenses.forEach((fe, idx) => {
                const item = document.createElement('div');
                item.style = "display:flex; justify-content:space-between; margin-bottom:0.5rem; padding:0.5rem; background:rgba(255,255,255,0.02); border-radius:4px;";
                item.innerHTML = `
                    <span>${fe.name} (${formatNum(fe.amount)})</span>
                    <span class="delete-btn" onclick="deleteFixedExpense(${idx})">삭제</span>
                `;
                fList.appendChild(item);
            });
        }

        function updateBudget(cat, val) {
            userSettings.budgets[cat] = parseInt(val) || 0;
            saveSettings();
            updateByMonth();
        }

        function addFixedExpense() {
            const name = document.getElementById('f-name').value;
            const amount = parseInt(document.getElementById('f-amount').value);
            if (!name || isNaN(amount)) return alert('올바른 값을 입력하세요.');

            userSettings.fixedExpenses.push({ name, amount, category: '고정비' });
            saveSettings();
            renderSettings();
            updateByMonth();
            document.getElementById('f-name').value = '';
            document.getElementById('f-amount').value = '';
        }

        function deleteFixedExpense(idx) {
            userSettings.fixedExpenses.splice(idx, 1);
            saveSettings();
            renderSettings();
            updateByMonth();
        }

        function saveSettings() {
            localStorage.setItem('userSettings_v4', JSON.stringify(userSettings));
        }

        // 데이터 백업 및 복구
        function exportData() {
            const data = { manualData, userSettings };
            const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `가계부_백업_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
        }

        function importData(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function (evt) {
                const data = JSON.parse(evt.target.result);
                if (data.manualData) {
                    manualData = data.manualData;
                    userSettings = data.userSettings;
                    localStorage.setItem('manualFinances', JSON.stringify(manualData));
                    saveSettings();
                    location.reload();
                }
            };
            reader.readAsText(file);
        }

        function exportCSV() {
            const combinedTx = [...fullData.variable_transactions, ...manualData];
            let csv = "날짜,가맹점,금액,카테고리,출처\n";
            combinedTx.forEach(t => {
                csv += `${t.date},${t.merchant},${t.amount},${t.category},${t.source}\n`;
            });
            const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `거래내역_${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
        }

        function addManualEntry() {
            const dateVal = document.getElementById('m-date').value;
            const typeVal = document.getElementById('m-type').value;
            const merchantVal = document.getElementById('m-merchant').value;
            const amountVal = parseInt(document.getElementById('m-amount').value);
            const categoryVal = document.getElementById('m-category').value;

            if (!dateVal || !merchantVal || isNaN(amountVal)) {
                alert('모든 항목을 올바르게 입력해주세요.');
                return;
            }

            const dateParts = dateVal.split('-');
            const formattedDate = `${dateParts[1]}.${dateParts[2]}`; // MM.DD 형식

            const newEntry = {
                id: Date.now(),
                date: formattedDate,
                yearMonth: `${dateParts[0]}.${dateParts[1]}`, // YYYY.MM
                fullDate: dateVal,
                type: typeVal,
                merchant: merchantVal,
                amount: amountVal,
                category: typeVal === 'income' ? '수입' : categoryVal,
                source: '수동입력'
            };

            manualData.push(newEntry);
            localStorage.setItem('manualFinances', JSON.stringify(manualData));

            document.getElementById('m-merchant').value = '';
            document.getElementById('m-amount').value = '';

            renderManualList();
            updateByMonth();
            initTrendChart();
            alert('저장되었습니다.');
        }

        function deleteManualEntry(id) {
            if (confirm('삭제하시겠습니까?')) {
                manualData = manualData.filter(item => item.id !== id);
                localStorage.setItem('manualFinances', JSON.stringify(manualData));
                renderManualList();
                updateByMonth();
                initTrendChart();
            }
        }

        function renderManualList() {
            const body = document.getElementById('manual-entries-body');
            if (!body) return;
            body.innerHTML = '';
            manualData.sort((a, b) => b.id - a.id).forEach(item => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${item.fullDate}</td>
                    <td>${item.merchant}</td>
                    <td style="color:${item.type === 'income' ? 'var(--success)' : 'white'}">${formatNum(item.amount)}</td>
                    <td><span class="delete-btn" onclick="deleteManualEntry(${item.id})">삭제</span></td>
                `;
                body.appendChild(tr);
            });
        }

        function formatNum(num) {
            return new Intl.NumberFormat('ko-KR').format(num) + '원';
        }


        function updateByMonth() {
            const selectedMonth = document.getElementById('month-selector').value;

            // 1. 수입 및 고정비 동적 결정 (사용자 설정 우선)
            let currentIncome = fullData.income;
            let currentFixedExpenses = userSettings.fixedExpenses;

            if (selectedMonth !== 'all' && fullData.monthly_stats && fullData.monthly_stats[selectedMonth]) {
                const stats = fullData.monthly_stats[selectedMonth];
                if (stats.income > 0) currentIncome = stats.income;
                // 월별 특화 고정비가 엑셀 데이터에 있으면 사용자 설정과 병합 고려할 수 있으나 UI 편의상 사용자 설정 유지
            }

            // 2. 데이터 필터링 (원본 + 수동입력)
            const combinedTx = [...fullData.variable_transactions, ...manualData];
            const filteredTx = selectedMonth === 'all'
                ? combinedTx
                : combinedTx.filter(tr => tr.date.startsWith(selectedMonth));

            // 수입/지출 합계 계산
            const manualIncomes = manualData.filter(m => m.type === 'income');
            const filteredManualIncomes = selectedMonth === 'all'
                ? manualIncomes
                : manualIncomes.filter(m => m.date.startsWith(selectedMonth));

            let monthTotalIncome = currentIncome;
            if (selectedMonth !== 'all') {
                const manualIncomeForMonth = filteredManualIncomes.reduce((acc, curr) => acc + curr.amount, 0);
                monthTotalIncome = currentIncome + manualIncomeForMonth;
            }

            const fixedTotal = currentFixedExpenses.reduce((acc, curr) => acc + curr.amount, 0);
            const variableTotal = filteredTx.filter(t => t.category !== '수입').reduce((acc, curr) => acc + curr.amount, 0);
            const totalExpense = fixedTotal + variableTotal;

            // 지능형 인사이트 & 예산 진행률
            renderInsights(monthTotalIncome, totalExpense, filteredTx);

            // 요약 수치 업데이트
            document.getElementById('total-income').innerText = formatNum(monthTotalIncome);
            document.getElementById('total-expense').innerText = formatNum(totalExpense);
            document.getElementById('balance').innerText = formatNum(monthTotalIncome - totalExpense);

            // 카테고리 분포 차트 업데이트
            const catMap = {};
            [...currentFixedExpenses, ...filteredTx].forEach(item => {
                if (item.category === '수입') return;
                catMap[item.category] = (catMap[item.category] || 0) + item.amount;
            });

            if (categoryChart) categoryChart.destroy();
            categoryChart = new Chart(document.getElementById('categoryChart'), {
                type: 'doughnut',
                data: {
                    labels: Object.keys(catMap).map(k => k.replace('_', '/')),
                    datasets: [{
                        data: Object.values(catMap),
                        backgroundColor: ['#38bdf8', '#22c55e', '#a855f7', '#ec4899', '#f59e0b', '#3b82f6', '#14b8a6', '#94a3b8'],
                        borderWidth: 0
                    }]
                },
                options: { maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8' } } } }
            });

            // 고정비 리스트 업데이트
            const list = document.getElementById('fixed-expenses-list');
            list.innerHTML = '';
            currentFixedExpenses.forEach(ex => {
                const row = document.createElement('div');
                row.style = "display:flex; justify-content:space-between; padding:0.75rem 0; border-bottom:1px solid rgba(255,255,255,0.05);";
                row.innerHTML = `<span>${ex.name} <small style="color:var(--text-secondary)">(${ex.category})</small></span><b>${formatNum(ex.amount)}</b>`;
                list.appendChild(row);
            });

            renderTables(filteredTx);
            renderCalendar(selectedMonth, filteredTx);
        }

        // v4.0 지능형 분석 및 예산 UI
        function renderInsights(income, expense, txList) {
            const today = new Date();
            const daysInMonth = new Date(today.getFullYear(), today.getMonth() + 1, 0).getDate();
            const currentDay = today.getDate();
            const selectedMonthStr = document.getElementById('month-selector').value;

            // 1. 지능형 인사이트 (예측 + 전월 대비)
            let insightHtml = "";

            // A. 지출 예측 (Forecast)
            const dailyAvg = expense / currentDay;
            const projectedExpense = Math.floor(dailyAvg * daysInMonth);

            insightHtml += `💡 <b>스마트 지출 레포트:</b> 현재 하루 평균 <b>${formatNum(Math.floor(dailyAvg))}</b>를 소비하고 있습니다.<br>`;
            insightHtml += `월말까지 이 추세가 계속되면 총 <b>${formatNum(projectedExpense)}</b>를 지출할 것으로 예측됩니다.`;
            if (projectedExpense > income) {
                insightHtml += ` <span style="color:#ef4444; font-weight:700;">(수입 초과 경보!)</span>`;
            }

            // B. 전월 대비 비교 (MoM)
            const prevMonthDate = new Date(today.getFullYear(), today.getMonth() - 1, 1);
            // MM 형식 맞추기 (예: 2 -> 02)
            const pm = (prevMonthDate.getMonth() + 1).toString().padStart(2, '0');
            const prevMonthStr = `${prevMonthDate.getFullYear()}.${pm}`;
            const currentMonthStr = `${today.getFullYear()}.${(today.getMonth() + 1).toString().padStart(2, '0')}`;

            // 선택된 월이 현재 월이거나 '전체'일 때만 전월 대비 분석 수행
            if (selectedMonthStr === 'all' || selectedMonthStr.replace('-', '.') === currentMonthStr) {
                const combinedAll = [...fullData.variable_transactions, ...manualData];
                const prevMonthTx = combinedAll.filter(t => {
                    const tMonth = t.yearMonth || (t.date.split('.')[0].padStart(2, '0'));
                    const tDay = parseInt(t.date.split('.')[1]);
                    return (t.date.startsWith(pm + '.') || t.yearMonth === prevMonthStr) && tDay <= currentDay;
                });

                const prevFixedTotal = userSettings.fixedExpenses.reduce((acc, curr) => acc + curr.amount, 0);
                const prevVariableTotal = prevMonthTx.filter(t => t.category !== '수입').reduce((acc, curr) => acc + curr.amount, 0);
                const prevTotalSamePeriod = prevFixedTotal + prevVariableTotal;

                const diff = expense - prevTotalSamePeriod;
                const diffPct = prevTotalSamePeriod > 0 ? (diff / prevTotalSamePeriod * 100) : 0;

                insightHtml += `<br>📊 <b>전월 동기간 대비:</b> 지난달 같은 날짜(${currentDay}일)까지보다 `;
                if (diff > 0) {
                    insightHtml += `<span style="color:#ef4444; font-weight:700;">${formatNum(diff)} (${diffPct.toFixed(1)}%) 더 많이</span> 쓰고 있습니다. 지출 관리가 필요해 보여요!`;
                } else if (diff < 0) {
                    insightHtml += `<span style="color:#22c55e; font-weight:700;">${formatNum(Math.abs(diff))} (${Math.abs(diffPct).toFixed(1)}%) 더 적게</span> 쓰고 있습니다. 아주 잘하고 계시네요!`;
                } else {
                    insightHtml += `정확히 동일한 금액을 쓰고 있습니다.`;
                }
            }

            const insightBox = document.getElementById('smart-insight');
            insightBox.style.display = 'block';
            insightBox.innerHTML = insightHtml;

            // 2. 예산 진행률 바
            const bList = document.getElementById('budget-progress-list');
            bList.innerHTML = '';

            const spendingByCat = {};
            txList.forEach(t => {
                if (t.category === '수입') return;
                const key = t.category.replace('/', '_');
                spendingByCat[key] = (spendingByCat[key] || 0) + t.amount;
            });

            Object.keys(userSettings.budgets).forEach(cat => {
                const spent = spendingByCat[cat] || 0;
                const budget = userSettings.budgets[cat];
                const pct = Math.min(100, (spent / budget) * 100);
                const color = pct > 90 ? '#ef4444' : (pct > 70 ? '#f59e0b' : '#38bdf8');

                const div = document.createElement('div');
                div.style.marginBottom = '1.2rem';
                div.innerHTML = `
                    <div style="display:flex; justify-content:space-between; font-size:0.85rem; margin-bottom:4px;">
                        <span>${cat.replace('_', '/')}</span>
                        <span>${formatNum(spent)} / ${formatNum(budget)} (${Math.floor(pct)}%)</span>
                    </div>
                    <div class="progress-container">
                        <div class="progress-bar" style="width:${pct}%; background:${color};"></div>
                    </div>
                `;
                bList.appendChild(div);
            });
        }

        function renderCalendar(month, txList) {
            const calendarBody = document.getElementById('calendar-body');
            calendarBody.innerHTML = '';

            // 헤더 추가
            const weekDays = ['일', '월', '화', '수', '목', '금', '토'];
            weekDays.forEach(day => {
                const header = document.createElement('div');
                header.className = 'calendar-header';
                header.innerText = day;
                calendarBody.appendChild(header);
            });

            // 연도 및 월 설정 (기본 2026년으로 가정)
            const year = 2026;
            const targetMonth = month === 'all' ? 3 : parseInt(month); // 전체보기일 경우 3월 기본
            const firstDay = new Date(year, targetMonth - 1, 1).getDay();
            const daysInMonth = new Date(year, targetMonth, 0).getDate();

            // 이전 달 빈 칸
            for (let i = 0; i < firstDay; i++) {
                const empty = document.createElement('div');
                empty.className = 'calendar-day other-month';
                calendarBody.appendChild(empty);
            }

            // 날짜별 데이터 그룹화
            const dayMap = {};
            txList.forEach(tr => {
                const parts = tr.date.split('.');
                const m = parseInt(parts[0]);
                const d = parseInt(parts[1]);

                if (m === targetMonth) {
                    if (!dayMap[d]) dayMap[d] = { in: 0, out: 0, items: [] };
                    if (tr.category === '수입') {
                        dayMap[d].in += tr.amount;
                    } else {
                        dayMap[d].out += tr.amount;
                    }
                    dayMap[d].items.push(tr);
                }
            });

            // 날짜 생성
            for (let d = 1; d <= daysInMonth; d++) {
                const dayNode = document.createElement('div');
                dayNode.className = 'calendar-day';
                dayNode.onclick = () => showDayDetails(d, dayMap[d]);

                const info = dayMap[d] || { in: 0, out: 0 };

                dayNode.innerHTML = `
                    <div class="day-number">${d}</div>
                    <div class="day-info">
                        ${info.in > 0 ? `<div class="amount-in">+${info.in.toLocaleString()}</div>` : ''}
                        ${info.out > 0 ? `<div class="amount-out">-${info.out.toLocaleString()}</div>` : ''}
                    </div>
                `;
                calendarBody.appendChild(dayNode);
            }
        }

        function showDayDetails(day, info) {
            const detailContainer = document.getElementById('selected-day-info');
            if (!info || info.items.length === 0) {
                detailContainer.innerHTML = `<h3 style="margin-bottom:1rem;">${day}일 상세 내역</h3><p style="color:var(--text-secondary)">내역이 없습니다.</p>`;
                return;
            }

            let html = `<h3 style="margin-bottom:1rem;">${day}일 상세 내역</h3>`;
            html += `<table><thead><tr><th>가맹점</th><th>금액</th><th>카테고리</th></tr></thead><tbody>`;
            info.items.forEach(item => {
                const safeCat = item.category.replace(/\//g, '_');
                html += `<tr>
                    <td>${item.merchant}</td>
                    <td style="font-weight:600;">${formatNum(item.amount)}</td>
                    <td><span class="category-tag cat-${safeCat}">${item.category}</span></td>
                </tr>`;
            });
            html += `</tbody></table>`;
            detailContainer.innerHTML = html;
        }

        function renderTables(txList) {
            const topTable = document.getElementById('top-expenses').querySelector('tbody');
            const allTable = document.getElementById('all-expenses').querySelector('tbody');
            topTable.innerHTML = '';
            allTable.innerHTML = '';

            const sortedTx = [...txList].sort((a, b) => b.amount - a.amount);

            sortedTx.forEach((tr, idx) => {
                const safeCat = tr.category.replace(/\//g, '_');
                const rowHTML = `
                    <td>${tr.date}</td>
                    <td>${tr.merchant}</td>
                    <td style="font-weight:600;">${formatNum(tr.amount)}</td>
                    <td><span class="category-tag cat-${safeCat}">${tr.category}</span></td>
                `;

                if (idx < 5) {
                    const row = document.createElement('tr');
                    row.innerHTML = rowHTML;
                    topTable.appendChild(row);
                }

                const rowAll = document.createElement('tr');
                rowAll.innerHTML = rowHTML;
                allTable.appendChild(rowAll);
            });

            // 상세 페이지 필터용 카테고리 셀렉트 업데이트
            const catSet = new Set(txList.map(t => t.category));
            const filterSelect = document.getElementById('filter-cat');
            filterSelect.innerHTML = '<option value="all">모든 카테고리</option>';
            catSet.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c; opt.innerText = c;
                filterSelect.appendChild(opt);
            });
        }

        function initTrendChart() {
            const monthlyData = { '12월': 0, '1월': 0, '2월': 0, '3월': 0 };
            const combinedTx = [...fullData.variable_transactions, ...manualData];

            combinedTx.forEach(tr => {
                if (tr.category === '수입') return;
                const m = tr.date.split('.')[0];
                if (m === '12') monthlyData['12월'] += tr.amount;
                if (m === '01') monthlyData['1월'] += tr.amount;
                if (m === '02') monthlyData['2월'] += tr.amount;
                if (m === '03') monthlyData['3월'] += tr.amount;
            });

            if (trendChart) trendChart.destroy();
            trendChart = new Chart(document.getElementById('trendChart'), {
                type: 'line',
                data: {
                    labels: Object.keys(monthlyData),
                    datasets: [{
                        label: '변동 지출액',
                        data: Object.values(monthlyData),
                        borderColor: '#38bdf8',
                        backgroundColor: 'rgba(56, 189, 248, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    maintainAspectRatio: false,
                    scales: {
                        y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8' } },
                        x: { ticks: { color: '#94a3b8' } }
                    }
                }
            });
        }

        function filterTable() {
            const search = document.getElementById('search-tx').value.toLowerCase();
            const cat = document.getElementById('filter-cat').value;
            const rows = document.getElementById('all-expenses').querySelector('tbody').rows;

            for (let row of rows) {
                const merchant = row.cells[1].innerText.toLowerCase();
                const category = row.cells[3].innerText;
                const matchesSearch = merchant.includes(search);
                const matchesCat = (cat === 'all' || category === cat);
                row.style.display = (matchesSearch && matchesCat) ? "" : "none";
            }
        }

        function handleExcelUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function (e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const firstSheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[firstSheetName];
                const jsonData = XLSX.utils.sheet_to_json(worksheet);

                processExcelData(jsonData, file.name);
            };
            reader.readAsArrayBuffer(file);
        }

        function processExcelData(rows, filename) {
            if (!rows || rows.length === 0) {
                alert('엑셀 파일에 데이터가 없습니다.');
                return;
            }

            // 첫 번째 행의 키(컬럼명) 목록 추출 (진단용)
            const actualKeys = Object.keys(rows[0]);

            // 헬퍼: 숫자 추출 (콤마, 원, ₩ 제거)
            const cleanAmount = (val) => {
                if (typeof val === 'number') return val;
                if (!val) return 0;
                return parseInt(val.toString().replace(/[^0-9-]/g, '')) || 0;
            };

            // 헬퍼: 날짜 정규화 (MM.DD 형식으로)
            const normalizeDate = (val) => {
                if (!val) return new Date().toLocaleDateString('ko-KR').slice(5, -1).replace(/\. /g, '.');

                // 엑셀 날짜 일련번호 처리
                if (typeof val === 'number') {
                    const date = new Date((val - 25569) * 86400 * 1000);
                    return `${(date.getMonth() + 1).toString().padStart(2, '0')}.${date.getDate().toString().padStart(2, '0')}`;
                }

                const str = val.toString().trim();
                // YYYY-MM-DD 또는 YYYY.MM.DD 등 다양한 형식 대응
                const dateParts = str.match(/(\d{1,2})[.\-/](\d{1,2})/);
                if (dateParts) {
                    const m = dateParts[1].padStart(2, '0');
                    const d = dateParts[2].padStart(2, '0');
                    return `${m}.${d}`;
                }
                return str;
            };

            // 컬럼명 매핑 후보군 (더 다양하게 추가)
            const colMaps = {
                date: ['거래일시', '거래일', '일자', 'Date', '날짜', '작성일', '일시', '승인일자', '사용일자'],
                merchant: ['가맹점명', '거래처', '내역', '적요', 'Merchant', '가맹점', '사용처', '항목', '내용', '가맹점명/찾으신분', '거래대상'],
                amount: ['거래금액', '지출', '금액', 'Amount', '출금금액', '합계', '결제금액', '사용금액', '승인금액', '이용금액'],
                category: ['분류', '유형', 'Category', '카테고리', '구분', '업종']
            };

            const findVal = (row, candidates) => {
                const rowKeys = Object.keys(row);
                // 공백 제거 및 소문자화하여 비교 (더 유연한 매핑)
                const foundKey = rowKeys.find(rk => {
                    const cleanRK = rk.replace(/\s/g, '').toLowerCase();
                    return candidates.some(c => c.replace(/\s/g, '').toLowerCase() === cleanRK);
                });
                return foundKey ? row[foundKey] : null;
            };

            const newTransactions = rows.map(row => {
                const rawAmount = findVal(row, colMaps.amount);
                const amount = cleanAmount(rawAmount);

                return {
                    id: Date.now() + Math.random(),
                    date: normalizeDate(findVal(row, colMaps.date)),
                    merchant: findVal(row, colMaps.merchant) || '알 수 없음',
                    amount: amount,
                    category: findVal(row, colMaps.category) || '기타',
                    source: filename,
                    type: 'expense'
                };
            }).filter(tr => tr.amount > 0);

            if (newTransactions.length === 0) {
                const diagMsg = actualKeys.slice(0, 10).join(', ');
                alert(`업로드된 파일에서 유효한 데이터를 찾을 수 없습니다.\n\n[확인된 컬럼명]\n${diagMsg}\n\n매핑되는 키워드가 없어 인식에 실패했습니다. 컬럼명을 확인해주세요.`);
                return;
            }

            fullData.variable_transactions = [...newTransactions, ...fullData.variable_transactions];
            saveToLocal();
            init();
            alert(`${newTransactions.length}건의 데이터를 성공적으로 업로드했습니다!`);
        }

        async function handleOCRUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            // 로딩 표시
            const btn = event.target.previousElementSibling;
            const originalText = btn.innerText;
            btn.innerText = '⌛ 준비 중...';
            btn.disabled = true;

            let worker = null;
            try {
                // Tesseract 워커 상세 설정 (더 안정적인 방식)
                worker = await Tesseract.createWorker({
                    logger: m => {
                        console.log(m);
                        if (m.status === 'recognizing') {
                            btn.innerText = `⌛ 분석 중 (${Math.round(m.progress * 100)}%)`;
                        } else if (m.status === 'loading tesseract core') {
                            btn.innerText = '⌛ 코어 로딩 중...';
                        }
                    },
                    errorHandler: err => console.error("Worker Error:", err)
                });

                await worker.loadLanguage('kor+eng');
                await worker.initialize('kor+eng');

                const { data: { text } } = await worker.recognize(file);

                console.log("OCR 추출 텍스트:", text);
                const parsedData = parseReceiptText(text);

                if (parsedData.amount > 0) {
                    fillManualEntryForm(parsedData);
                    alert('영수증 분석 완료! 수동 입력 탭에서 내용을 확인하고 저장해주세요.');
                } else {
                    alert('금액을 인식하지 못했습니다. 사진을 더 밝고 선명하게 찍어보시거나, 직접 입력해주세요.');
                    openTab(null, 'manual');
                }
            } catch (error) {
                console.error("OCR 상세 에러:", error);
                alert(`이미지 분석 중 오류가 발생했습니다.\n가능한 원인: 인터넷 연결 불안정 또는 브라우저 호환성\n상세: ${error.message || 'Unknown Error'}`);
            } finally {
                if (worker) await worker.terminate();
                btn.innerText = originalText;
                btn.disabled = false;
                event.target.value = ''; // 초기화
            }
        }

        function parseReceiptText(text) {
            const data = {
                date: new Date().toISOString().split('T')[0], // 기본값 오늘
                merchant: '알 수 없음',
                amount: 0
            };

            // 1. 금액 추출 (가장 큰 숫자 패턴 찾기)
            // 보통 "금액", "합계", "결제금액" 근처에 있음
            const amountMatches = text.replace(/,/g, '').match(/\d{3,9}/g);
            if (amountMatches) {
                // 영수증에서 가장 큰 숫자가 보통 합계인 경우가 많음 (단, 카드번호 제외 필요)
                const numbers = amountMatches.map(Number).filter(n => n < 10000000); // 1억 이하만
                if (numbers.length > 0) {
                    data.amount = Math.max(...numbers);
                }
            }

            // 2. 날짜 추출 (YYYY.MM.DD 또는 YY/MM/DD)
            const dateMatch = text.match(/20\d{2}[.\-/]\d{2}[.\-/]\d{2}/) || text.match(/\d{2}[.\-/]\d{2}[.\-/]\d{2}/);
            if (dateMatch) {
                let d = dateMatch[0].replace(/[.\-/]/g, '-');
                if (d.length === 8) d = '20' + d; // YY-MM-DD -> 20YY-MM-DD
                data.date = d;
            }

            // 3. 가맹점 (첫 줄이나 특정 키워드 앞)
            const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 1);
            if (lines.length > 0) {
                // 보통 첫 번째 줄이 상호명인 경우가 많음
                data.merchant = lines[0];
            }

            return data;
        }

        function fillManualEntryForm(data) {
            openTab(null, 'manual');
            document.getElementById('m-date').value = data.date;
            document.getElementById('m-merchant').value = data.merchant;
            document.getElementById('m-amount').value = data.amount;
            document.getElementById('m-type').value = 'expense';
        }

        function saveToLocal() {
            localStorage.setItem('finance_data_v4', JSON.stringify(fullData));
            localStorage.setItem('manual_records_v4', JSON.stringify(manualData));
        }

        function resetToInitial() {
            if (confirm('모든 데이터를 초기화하고 기본 상태로 되돌리시겠습니까?')) {
                localStorage.removeItem('finance_data_v4');
                localStorage.removeItem('manual_records_v4');
                location.reload();
            }
        }

        // 기존 init 함수 수정하여 LocalStorage 먼저 읽도록 변경
        const originalInit = init;
        init = function () {
            const savedData = localStorage.getItem('finance_data_v4');
            const savedManual = localStorage.getItem('manual_records_v4');

            if (savedData) fullData = JSON.parse(savedData);
            if (savedManual) manualData = JSON.parse(savedManual);

            originalInit();
        };

        // Service Worker 등록 (PWA 설치 가능하도록)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker Registered'))
                    .catch(err => console.log('Service Worker Registration Failed', err));
            });
        }

        init();
    </script>
